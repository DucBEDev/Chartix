<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chartix - Settings</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="top-header">
            <a href="index.html" class="logo-container">Chart<span>ix</span></a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Dashboard</a>
                <a href="markets.html" class="nav-item">Markets</a>
                <a href="news.html" class="nav-item">News</a>
                <a href="calendar.html" class="nav-item">Calendar</a>
            </nav>
            <div class="market-ticker">
                <div class="ticker-item"><span class="ticker-pair">BTC/USDT</span><span class="ticker-price up">64,230.50</span></div>
            </div>
            <div class="header-actions"><a href="login.html" class="btn-connect">Login</a></div>
        </header>

        <div class="content-wrapper">
            <main class="main-area">
                <div>
                    <h1 class="page-title">Settings</h1>
                    <p class="page-subtitle">Manage your account and preferences.</p>
                </div>
                
                <div class="panel" style="max-width: 600px;">
                    <div class="panel-header">
                        <div class="panel-title">Preferences</div>
                    </div>
                    <div style="padding: 24px; display:flex; flex-direction:column; gap:16px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span>Theme</span>
                            <span style="color:var(--text-secondary)">Dark (Default)</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span>Notifications</span>
                            <span style="color:var(--accent-blue)">Enabled</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span>Language</span>
                            <span style="color:var(--text-secondary)">English</span>
                        </div>
                    </div>
                </div>
            </main>

            <aside class="ai-panel">
                <div class="ai-header">
                    <div class="ai-avatar">AI</div>
                    <div class="ai-title"><h3>Chartix Intelligence</h3><p>Online & Ready</p></div>
                </div>
                <div class="chat-history" id="chat-container">
                    <div class="msg ai"><div class="msg-bubble">Bạn có thể cấu hình cảnh báo giá qua AI tại mục cài đặt này.</div></div>
                </div>
                <div class="chat-input-area">
                    <div class="input-box">
                        <input type="text" placeholder="Hỏi AI về mã giao dịch..." id="chat-input" autocomplete="off">
                        <button class="btn-send" id="btn-send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
