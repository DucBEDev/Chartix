<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chartix - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Sticky Top Header (Minimal for Login) -->
        <header class="top-header" style="justify-content: center;">
            <a href="index.html" class="logo-container">Chart<span>ix</span></a>
        </header>

        <!-- Content Area -->
        <div class="content-wrapper" style="background-image: radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, transparent 60%);">
            <main class="auth-container">
                <div class="auth-box">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Log in to your Chartix account to continue.</p>
                    
                    <form action="index.html">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-input" placeholder="name@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-primary">Sign In</button>
                    </form>
                    
                    <div class="auth-link">
                        Don't have an account? <a href="#">Sign Up</a>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
